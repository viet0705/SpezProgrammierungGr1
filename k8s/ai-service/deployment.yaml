apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: spezprogrammierunggr1-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATA_SERVICE_URL
              value: http://data-service:8000
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-api-secret
                  key: OPENAI_API_KEY
                  optional: true
            - name: OPENAI_BASE_URL
              value: https://api.openai.com/v1
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
